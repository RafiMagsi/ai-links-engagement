name: Deploy to HestiaCP Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9.0.0'
  DEPLOY_DIR: '/home/rafiadmin/web/ailinksengagement.dropticks.com/public_html'
  DEPLOY_USER: 'rafiadmin'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check || true

      - name: Lint
        run: pnpm lint || true

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify build outputs
        run: |
          test -d apps/admin/.next || (echo "❌ Admin build failed" && exit 1)
          test -d apps/worker/dist || (echo "❌ Worker build failed" && exit 1)
          echo "✅ All builds completed successfully"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to HestiaCP server
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_SCRIPT'
            set -e

            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"

            echo "=========================================="
            echo "Starting deployment to HestiaCP..."
            echo "Target: $DEPLOY_DIR"
            echo "=========================================="

            # Ensure deploy directory exists
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Check if git repo exists
            if [ ! -d .git ]; then
              echo "Initializing git repository..."
              git init
              git remote add origin ${{ github.server_url }}/${{ github.repository }}.git
            fi

            # Pull latest changes
            echo "📥 Pulling latest changes from main branch..."
            git fetch origin main
            git checkout origin/main
            git reset --hard origin/main

            # Install dependencies
            echo "📦 Installing dependencies..."
            pnpm install --frozen-lockfile

            # Build applications
            echo "🔨 Building applications..."
            pnpm run build

            # Create backup
            echo "💾 Creating backup..."
            BACKUP_DIR="$DEPLOY_DIR/backups/backup-$(date +%Y%m%d-%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            if [ -d ecosystem.config.js ]; then
              cp ecosystem.config.js "$BACKUP_DIR/"
            fi

            # Create .config directory and serviceAccountKey.json
            echo "⚙️  Setting up Firebase credentials..."
            mkdir -p .config
            echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > .config/serviceAccountKey.json

            ABSOLUTE_PATH="$DEPLOY_DIR/.config/serviceAccountKey.json"
            echo "Firebase credentials created at: $ABSOLUTE_PATH"

            # Ensure .env.local files exist - they should be created manually on server
            echo "⚙️  Checking for .env.local files..."

            if [ ! -f apps/admin/.env.local ]; then
              echo "⚠️  apps/admin/.env.local not found - create it on the server with:"
              echo "   GOOGLE_APPLICATION_CREDENTIALS=$ABSOLUTE_PATH"
            fi

            if [ ! -f apps/worker/.env.local ]; then
              echo "⚠️  apps/worker/.env.local not found - create it on the server with:"
              echo "   GOOGLE_APPLICATION_CREDENTIALS=$ABSOLUTE_PATH"
            fi

            # Ensure PM2 is installed globally
            echo "🚀 Checking PM2..."
            pm2 -v

            # Stop current processes gracefully
            echo "⏹️  Stopping current processes..."
            pm2 delete ecosystem.config.js 2>/dev/null || true
            sleep 2

            # Start new processes
            echo "▶️  Starting services with PM2..."
            pm2 start ecosystem.config.js
            pm2 save

            # Wait for services to stabilize
            echo "⏳ Waiting for services to stabilize..."
            sleep 5

            # Health checks
            echo "🏥 Running health checks..."

            # Check Admin service
            ADMIN_HEALTH=0
            for i in {1..30}; do
              if curl -f -s http://127.0.0.1:3000/api/queue/status > /dev/null 2>&1; then
                echo "✅ Admin service is healthy"
                ADMIN_HEALTH=1
                break
              fi
              echo "⏳ Admin service check $i/30..."
              sleep 1
            done

            if [ $ADMIN_HEALTH -eq 0 ]; then
              echo "❌ Admin service health check failed"
              pm2 logs
              exit 1
            fi

            # Check Redis
            if redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "✅ Redis is healthy"
            else
              echo "⚠️  Redis check skipped or failed"
            fi

            # Check Worker process
            if pm2 list | grep -q "worker"; then
              echo "✅ Worker process is running"
            fi

            echo ""
            echo "=========================================="
            echo "✅ Deployment completed successfully!"
            echo "=========================================="
            echo "URL: https://ailinksengagement.dropticks.com"
            echo "Processes:"
            pm2 list
            echo ""
          DEPLOY_SCRIPT

      - name: Post-deployment verification
        if: success()
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'VERIFY_SCRIPT'
            echo "=========================================="
            echo "Post-Deployment Verification"
            echo "=========================================="

            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            cd "$DEPLOY_DIR"

            echo ""
            echo "📋 Active processes:"
            pm2 list

            echo ""
            echo "📊 Recent logs (last 20 lines):"
            pm2 logs --lines 20 --nostream || true

            echo ""
            echo "🔍 Checking application files:"
            ls -lh apps/admin/.next 2>/dev/null | head -5 || echo "Admin build not found"
            ls -lh apps/worker/dist 2>/dev/null | head -5 || echo "Worker build not found"

            echo ""
            echo "=========================================="
            echo "✅ All checks passed!"
            echo "=========================================="
          VERIFY_SCRIPT

      - name: Deployment success notification
        if: success()
        run: |
          echo "✅ Deployment to https://ailinksengagement.dropticks.com completed!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"

      - name: Deployment failure notification
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Please check the logs above for details."
          exit 1
