name: Deploy to HestiaCP Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9.0.0'
  DEPLOY_DIR: '/home/rafiadmin/web/ailinksengagement.dropticks.com/public_html'
  DEPLOY_USER: 'rafiadmin'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check || true

      - name: Lint
        run: pnpm lint || true

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm --filter admin build

      - name: Build worker
        run: pnpm --filter worker build

      - name: Upload admin build
        uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: apps/admin/.next
          retention-days: 5

      - name: Upload worker build
        uses: actions/upload-artifact@v4
        with:
          name: worker-build
          path: apps/worker/dist
          retention-days: 5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to HestiaCP server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"

            echo "=========================================="
            echo "Starting deployment to HestiaCP..."
            echo "Target: $DEPLOY_DIR"
            echo "=========================================="

            # Ensure deploy directory exists
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            # Check if git repo exists
            if [ ! -d .git ]; then
              echo "Initializing git repository..."
              git init
              git remote add origin ${{ github.server_url }}/${{ github.repository }}.git
            fi

            # Pull latest changes
            echo "📥 Pulling latest changes from main branch..."
            git fetch origin main
            git checkout origin/main
            git reset --hard origin/main

            # Install dependencies
            echo "📦 Installing dependencies..."
            pnpm install --frozen-lockfile

            # Build applications
            echo "🔨 Building applications..."
            pnpm run build

            # Create backup
            echo "💾 Creating backup..."
            BACKUP_DIR="$DEPLOY_DIR/backups/backup-$(date +%Y%m%d-%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            if [ -d ecosystem.config.js ]; then
              cp ecosystem.config.js "$BACKUP_DIR/"
            fi

            # Create .env.local if it doesn't exist (use GitHub secrets)
            if [ ! -f .env.local ]; then
              echo "⚙️  Creating .env.local..."
              cat > .env.local << 'EOF'
            NODE_ENV=production
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            REDIS_HOST=127.0.0.1
            REDIS_PORT=6379
            ADMIN_BASE_URL=https://ailinksengagement.dropticks.com
            DAILY_GLOBAL_ENGAGEMENT_CAP=100
            EOF
            fi

            # Create app-specific .env files
            if [ ! -f apps/admin/.env.local ]; then
              cp apps/admin/.env.example apps/admin/.env.local
            fi

            if [ ! -f apps/worker/.env.local ]; then
              cat > apps/worker/.env.local << 'EOF'
            NODE_ENV=production
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            REDIS_HOST=127.0.0.1
            REDIS_PORT=6379
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            WORKER_LOG_LEVEL=info
            WORKER_CONCURRENCY=5
            TIMEZONE=Asia/Karachi
            DAILY_QUOTA_POSTS=30
            DAILY_QUOTA_COMMENTS=50
            DAILY_QUOTA_REACTIONS=20
            DAILY_QUOTA_TOTAL=100
            JOB_MAX_ATTEMPTS=3
            JOB_BACKOFF_DELAY=1000
            EOF
            fi

            # Ensure PM2 is installed globally
            echo "🚀 Ensuring PM2 is installed..."
            npm install -g pm2

            # Stop current processes gracefully
            echo "⏹️  Stopping current processes..."
            pm2 delete ecosystem.config.js 2>/dev/null || true
            sleep 2

            # Start new processes
            echo "▶️  Starting services with PM2..."
            pm2 start ecosystem.config.js
            pm2 save

            # Wait for services to stabilize
            echo "⏳ Waiting for services to stabilize..."
            sleep 5

            # Health checks
            echo "🏥 Running health checks..."

            # Check Admin service
            ADMIN_HEALTH=0
            for i in {1..30}; do
              if curl -f -s http://127.0.0.1:3000/api/queue/status > /dev/null 2>&1; then
                echo "✅ Admin service is healthy"
                ADMIN_HEALTH=1
                break
              fi
              echo "⏳ Admin service check $i/30..."
              sleep 1
            done

            if [ $ADMIN_HEALTH -eq 0 ]; then
              echo "❌ Admin service health check failed"
              pm2 logs
              exit 1
            fi

            # Check Redis
            if redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "✅ Redis is healthy"
            else
              echo "⚠️  Redis check skipped or failed"
            fi

            # Check Worker process
            if pm2 list | grep -q "worker"; then
              echo "✅ Worker process is running"
            fi

            echo ""
            echo "=========================================="
            echo "✅ Deployment completed successfully!"
            echo "=========================================="
            echo "URL: https://ailinksengagement.dropticks.com"
            echo "Processes:"
            pm2 list
            echo ""

      - name: Post-deployment verification
        uses: appleboy/ssh-action@master
        if: success()
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            echo "=========================================="
            echo "Post-Deployment Verification"
            echo "=========================================="

            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            cd "$DEPLOY_DIR"

            echo ""
            echo "📋 Active processes:"
            pm2 list

            echo ""
            echo "📊 Recent logs (last 20 lines):"
            pm2 logs --lines 20 --nostream || true

            echo ""
            echo "🔍 Checking application files:"
            ls -lh apps/admin/.next 2>/dev/null | head -5 || echo "Admin build not found"
            ls -lh apps/worker/dist 2>/dev/null | head -5 || echo "Worker build not found"

            echo ""
            echo "=========================================="
            echo "✅ All checks passed!"
            echo "=========================================="

      - name: Deployment success notification
        if: success()
        run: |
          echo "✅ Deployment to https://ailinksengagement.dropticks.com completed!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"

      - name: Deployment failure notification
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Please check the logs above for details."
          exit 1
